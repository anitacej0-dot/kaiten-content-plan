version: 0.2
# Таксономия и правила эвристической классификации тем.
# Всё сравнение идёт по НОРМАЛИЗОВАННОМУ тексту (нижний регистр, без пунктуации):
# title + description + рубрика + раздел.
# Порядок кластеров важен: побеждает первый с максимальным числом совпадений;
# при равенстве — более специфичный (тот, что выше в списке).

# ------------------------------------------------------------------ КЛАСТЕРЫ
product_clusters:
  crm:
    label: "CRM"
    keywords: ["crm", "срм", "воронка продаж", "сделк", "клиент", "продаж", "карточка клиент", "техника продаж"]
  service_desk:
    label: "Service Desk / ITSM"
    keywords: ["service desk", "сервис деск", "сервисдеск", "helpdesk", "help desk", "хелпдеск", "техподдержк", "поддержк", "itsm", "itil", "заявк", "usedesk", "admin24"]
  vks:
    label: "ВКС / видеоконференции"
    keywords: ["вкс", "видеоконференц", "видеозвон", "созвон", "видеосвяз", "митап", "конференц-связ"]
  messenger:
    label: "Корпоративный мессенджер / чаты"
    keywords: ["мессенджер", "чат", "корпоративный мессендж", "командн", "коммуникац"]
  docs_kb:
    label: "Документы / база знаний"
    keywords: ["документ", "база знаний", "справочн", "wiki", "вики", "текстовый редактор", "редактор документ", "notion", "ноушен", "google docs", "справочный центр"]
  ai:
    label: "AI-функции"
    # ВНИМАНИЕ: без голого "ai" — оно ловит подстроку в "kaiten". И без голого "ии".
    keywords: ["нейросет", "нейронн", "искусственн", "gpt", "chatgpt", " ai ", "ai-",
      " ии ", "ии-", "ии для", "ии в проект", "ai для", "машинное обучен", "machine learning", "ml-"]
  project_management:
    label: "Управление проектами и задачами"
    keywords: ["управлен", "проект", "задач", "канбан", "kanban", "scrum", "скрам", "agile", "аджайл", "waterfall", "спринт", "гант", "ганта", "gantt", "методолог", "workflow", "исуп", "планирован", "трекер", "таск", "jira", "джира", "redmine", "microsoft project", "ганттпро", "ganttpro"]
  hr:
    label: "HR / найм"
    keywords: ["hr", "найм", "рекрут", "персонал", "сотрудник", "мотивац", "адаптац онбординг", "onboarding"]
  analytics_methods:
    label: "Аналитика и методы управления"
    keywords: ["аналитик", "метрик", "swot", "pestel", "rice", "паретто", "парето", "эйзенхауэр", "когортн", "адизес", "paei", "прогнозирован", "hadi"]

# кластер по умолчанию, если ничего не совпало
default_cluster: project_management

# ------------------------------------------------------------ СТРАТЕГ. РОЛЬ
# Признаки роли Protect / Convert / Build / Prove.
# Роль может уточняться данными (Roistat-трафик -> Protect; заявки -> Convert),
# здесь — текстовые эвристики как базовый слой.
strategy_roles:
  protect:
    label: "Protect"
    keywords: ["рерайт", "обновлен", "обновить", "актуализац", "что нового", "апдейт", "переработ", "дайджест новин"]
  convert:
    label: "Convert"
    keywords: ["аналог", "альтернатив", "сравнен", " vs ", " vs", "vs ", "выбрать", "как выбрать", "лучшие", "топ ", "топ-", "подборк", "обзор", "внедрен", "для отрасл", "для бухгалтер", "для hr", "для маркетинг", "для техподдержк", "решени для", "тариф", "цен"]
  prove:
    label: "Prove"
    keywords: ["кейс", "исследован", "интервью", "экспертн", "как мы ", "опыт ", "результат внедрен", "история клиент"]
  build:
    label: "Build"
    keywords: ["что такое", "гайд", "руководство", "объясня", "разбираем", "термин", "основы", "введен"]
# роль по умолчанию (когда сигналов роли нет)
default_role: build

# ------------------------------------------------------------- ЭТАП ВОРОНКИ
funnel_stages:
  decision:
    label: "Решение (BoFu)"
    keywords: ["аналог", "альтернатив", "сравнен", "выбрать", "как выбрать", "внедрен", "тариф", "цен", "демо", "купить", "для отрасл"]
  consideration:
    label: "Рассмотрение (MoFu)"
    keywords: ["обзор", "подборк", "лучшие", "топ ", "как работать", "как настроить", "шаблон", "сценар", "кейс"]
  awareness:
    label: "Осведомлённость (ToFu)"
    keywords: ["что такое", "гайд", "основы", "термин", "объясня", "введен", "методолог"]
  retention:
    label: "Удержание"
    keywords: ["обновлен", "что нового", "дайджест", "релиз"]
default_funnel: awareness

# ---------------------------------------------------------------- ТИП МАТЕРИАЛА
content_types:
  case: {label: "Кейс", keywords: ["кейс", "история клиент", "внедрение в"]}
  comparison: {label: "Сравнение / аналоги", keywords: ["аналог", "альтернатив", "сравнен", " vs", "vs "]}
  listicle: {label: "Подборка / топ", keywords: ["подборк", "лучшие", "топ ", "топ-", "обзор рынк"]}
  product: {label: "Продуктовая статья", keywords: ["kaiten для", "кайтен для", "продуктов", "обзор kaiten", "обзор кайтен", "workflows", "справочн", "анонс запуск", "что нового в кайтен", "обновления за"]}
  research: {label: "Исследование", keywords: ["исследован", "опрос", "данные показывают", "статистик"]}
  guide: {label: "Гайд / обучающая", keywords: ["что такое", "гайд", "руководство", "как ", "методолог", "термин"]}
  news: {label: "Новость / инфоповод", keywords: ["новост", "инфоповод", "анонс", "итоги", "конференц"]}
default_content_type: guide

# ------------------------------------------------------------------- ПЛОЩАДКИ
# Нормализация названий площадок (ключи ищутся в имени листа и в колонке «Площадка»).
platforms:
  blog: {label: "Блог Kaiten", aliases: ["блог", "blog", "kaiten.ru"]}
  habr: {label: "Habr", aliases: ["habr", "хабр"]}
  vc: {label: "VC.ru", aliases: ["vc", "вс.ру", "vc.ru"]}
  business_secrets: {label: "Бизнес-секреты", aliases: ["бизнес-секрет", "секреты", "secrets.tbank", "тбанк"]}
  crmindex: {label: "CRMindex", aliases: ["crmindex", "crm index"]}
  startpack: {label: "Startpack", aliases: ["startpack", "старпак"]}
  sostav: {label: "Sostav", aliases: ["sostav", "состав"]}
  partnerkin: {label: "Partnerkin", aliases: ["partnerkin", "партнеркин"]}
  tproger: {label: "Tproger", aliases: ["tproger", "тпрогер", "tgproger"]}
  ispring: {label: "iSpring / внешняя", aliases: ["ispring", "isp"]}
  e_executive: {label: "E-xecutive", aliases: ["e-xecutive", "executive", "e-executive"]}
  external_other: {label: "Внешняя (другое)", aliases: ["другое", "внешн"]}
default_platform: blog

# ------------------------------------------------------------------- СЕГМЕНТЫ
# Опциональная привязка сегмента по ключам (роль читателя/отрасль).
segments:
  it_dev: {label: "IT / разработка", keywords: ["разработ", "it ", "ит ", "программ", "devops", "инженер"]}
  management: {label: "Руководители / менеджмент", keywords: ["руководител", "менеджер", "директор", "управлен", "лидер", "продакт", "проджект"]}
  marketing: {label: "Маркетинг", keywords: ["маркетинг", "маркетолог", "smm", "реклам"]}
  sales: {label: "Продажи", keywords: ["продаж", "crm", "менеджер по продаж"]}
  support: {label: "Поддержка / сервис", keywords: ["поддержк", "service desk", "хелпдеск", "сервис"]}
  hr: {label: "HR", keywords: ["hr", "найм", "рекрут", "персонал"]}
  smb: {label: "Малый и средний бизнес", keywords: ["малый бизнес", "смб", "небольш команд"]}
  enterprise: {label: "Крупные компании / enterprise", keywords: ["крупн компан", "enterprise", "корпорац", "гос ", "строительств"]}
default_segment: management

# -------------------------------------------------------- СТАТУСЫ ГОТОВНОСТИ
# Как трактовать «Статус» из легаси-плана.
done_statuses: ["готова", "готово", "опубликован", "выпущен", "на площадке", "сдана", "done"]
in_progress_statuses: ["в работе", "на правках", "на согласовании", "согласование", "пишет", "в процессе"]
not_started_statuses: ["не начата", "не начат", "не согласовано", ""]

# --------------------------------------------------------- СЛУЖЕБНЫЕ СЛОВА
# Стоп-слова для нормализации тем при поиске дублей (рус + служебные).
stopwords: ["и", "в", "во", "не", "что", "он", "на", "я", "с", "со", "как", "а", "то",
  "все", "она", "так", "его", "но", "да", "ты", "к", "у", "же", "вы", "за", "бы", "по",
  "только", "ее", "мне", "было", "вот", "от", "меня", "о", "из", "ему", "теперь", "для",
  "про", "или", "эта", "этот", "это", "чем", "the", "a", "an", "of", "to", "in", "for",
  "рерайт", "статья", "тема", "материал", "пост", "обзор"]

# Служебные префиксы, которые срезаются в начале темы при нормализации.
strip_prefixes: ["рерайт кейса", "рерайт", "habr:", "vc:", "статья про", "статья по",
  "статья о", "статья в", "про ", "тема:", "анонс", "обновления за", "что нового в кайтен за",
  "что нового в кайтен"]

# Словарь синонимов: приводим варианты к единому ключевому термину до сравнения.
synonyms:
  "кайтен": "kaiten"
  "канбан": "kanban"
  "скрам": "scrum"
  "эджайл": "agile"
  "аджайл": "agile"
  "срм": "crm"
  "сервис деск": "service desk"
  "сервисдеск": "service desk"
  "хелпдеск": "helpdesk"
  "джира": "jira"
  "ноушен": "notion"
  "ноушн": "notion"
  "ганттпро": "ganttpro"
  "вкс": "видеоконференции"
  "нейросеть": "ai"
  "нейросети": "ai"
  "искусственный интеллект": "ai"
  "ии": "ai"
