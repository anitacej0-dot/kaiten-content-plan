version: 0.2
# Модель оценки тем. Итоговый score = сумма (значение_критерия[0..1] * weight)
# минус штрафы. max_score — сумма всех весов (для нормировки к 0..100).
#
# Для КАЖДОГО критерия скрипт score_candidates.py сохраняет не только число,
# но и короткое человекочитаемое обоснование (rationale). Автоматический балл —
# НЕ финальное решение: после оценки идёт сборка портфеля и ручное ревью.

max_score: 100

criteria:
  lead_potential:
    weight: 16
    description: "Лидовый потенциал: близость к заявке/регистрации, наличие заявок Roistat по теме/кластеру"
  commercial_proximity:
    weight: 14
    description: "Близость к продукту и коммерческому действию (сравнения, аналоги, внедрение, тарифы)"
  clear_cta:
    weight: 6
    description: "Есть понятный CTA и естественный маршрут к продукту"
  confirmed_demand:
    weight: 10
    description: "Подтверждённый спрос: SEO-сигнал, трафик, повтор в истории, запрос продаж"
  seo_potential:
    weight: 9
    description: "SEO-потенциал: частотность, наличие ТЗ SEO, трафиковый кластер конкурентов"
  product_priority:
    weight: 10
    description: "Актуальность продуктового направления и приоритет запуска"
  segment_fit:
    weight: 7
    description: "Ценность для приоритетного сегмента и роли читателя"
  evidence_strength:
    weight: 8
    description: "Наличие фактуры/доказательной базы (кейс, данные, эксперт, готовое ТЗ)"
  proof_or_case_potential:
    weight: 5
    description: "Возможность получить кейс, исследование или доказательство результата"
  distribution_potential:
    weight: 5
    description: "Потенциал внешней дистрибуции на сильные площадки"
  protect_value:
    weight: 6
    description: "Необходимость защитить существующий трафик/позиции (Protect)"
  timing:
    weight: 4
    description: "Сезонность, запуск, договорённость с площадкой, инфоповод"

# Штрафы вычитаются из нормированного (0..100) балла.
penalties:
  duplicate_or_cannibalization: -20   # почти точный дубль или явная каннибализация
  no_clear_business_role: -12         # нет стратегической роли/бизнес-смысла
  no_source_signal: -10               # нет ни одного подтверждающего сигнала
  unrealistic_dependency: -8          # зависит от труднодоступного эксперта/данных
  excessive_effort: -6                # высокая трудоёмкость без соразмерной ценности
  review_duplicate_soft: -6           # похожая тема, требует ручной проверки

# Модификаторы за трудоёмкость (effort) — влияет на protect/effort-баланс.
effort_scores:            # используется как «стоимость», не как ценность
  low: 1
  medium: 2
  high: 3

thresholds:
  must_plan: 72     # >= — сильный кандидат в план
  consider: 58      # >= и < must_plan — рассмотреть
  backlog: 44       # >= и < consider — в бэклог
  reject_below: 44  # < — отклонить (если нет ручного решения)

# Значения авто-оценки по сигналам. Скрипт переводит наличие сигналов в [0..1].
# Здесь — «якоря», которые складываются и обрезаются до 1.0.
signal_anchors:
  has_roistat_leads: 0.9         # по теме/кластеру есть заявки в Roistat
  has_roistat_traffic: 0.6       # есть заметный трафик
  has_seo_tz: 0.5                # заполнено «ТЗ SEO / ТЗ от Максима»
  is_comparison_or_alt: 0.8      # тип «сравнение/аналоги»
  is_product_article: 0.7        # продуктовая статья
  is_case_or_research: 0.8       # кейс/исследование
  from_sales_kam: 0.8            # пришло из запросов продаж/KAM
  from_product_launch: 0.85      # привязано к запуску
  history_repeat: 0.5            # повторяется в истории (спрос подтверждён практикой)
  editorial_only: 0.3            # только редакционная идея, без внешнего сигнала
