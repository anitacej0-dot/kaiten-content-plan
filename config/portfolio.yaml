version: 0.2
# Правила сборки портфеля на 6-7 недель. Проценты — стартовые квоты, не жёсткая норма.

planning_horizon_weeks: 7

# Целевые доли по стратегическим ролям (Convert имеет повышенный вес).
strategy_mix:
  protect: {min: 0.15, target: 0.22, max: 0.30}
  convert: {min: 0.28, target: 0.33, max: 0.42}
  build:   {min: 0.20, target: 0.27, max: 0.32}
  prove:   {min: 0.12, target: 0.18, max: 0.24}

# Мощность редакции. Реальные значения берутся из
# inputs/current_cycle/editorial_capacity.md (если есть); иначе — дефолты ниже.
capacity_defaults:
  items_per_week: 5           # сколько материалов редакция тянет в неделю
  max_items_per_week: 7       # жёсткий потолок недели (перегруз -> backlog)
  authors: 3                  # число доступных авторов/потоков
  max_high_effort_per_week: 2 # сколько «тяжёлых» материалов в неделю максимум
  external_share_max: 0.4     # доля внешних размещений от общего объёма

# Ограничения баланса.
balance:
  max_share_single_cluster: 0.40     # не больше 40% плана в один продуктовый кластер
  max_same_cluster_in_a_row: 2       # не больше 2 материалов одного кластера подряд по неделям
  max_same_product_article_streak: 2 # не больше 2 продуктовых статей об одном продукте подряд
  min_prove_items: 1                 # минимум 1 доказательный материал за цикл
  min_protect_items: 1               # минимум 1 Protect за цикл

# Обязательные материалы (product launches, анонсы) попадают в план вне score,
# но помечаются флагом mandatory=yes и отдельно подсвечиваются.
mandatory:
  bypass_score: true
  mark_flag: "ОБЯЗАТЕЛЬНАЯ"

portfolio_checks:
  - "Нет необоснованного перекоса в один продуктовый кластер (<= 40%)"
  - "Есть маршрут от информационного спроса к коммерческому контенту"
  - "Есть минимум один доказательный материал (Prove) по ключевому приоритету"
  - "Есть минимум один Protect-материал по трафиковой странице"
  - "Внешние публикации не являются механическим копированием блога (свой угол)"
  - "План помещается в заявленную редакционную мощность по неделям"
  - "Нет 3+ материалов одного продукта подряд"
